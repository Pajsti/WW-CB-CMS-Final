backend:
  name: git-gateway
  branch: main

media_folder: "public/gallery/uploads"
public_folder: "/gallery/uploads"

locale: "cs"

collections:
  - name: "news"
    label: "Aktuality"
    label_singular: "Článek"
    folder: "src/content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Název", name: "title", widget: "string" }
      - { label: "Datum", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss.SSSZ", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Krátký popis", name: "excerpt", widget: "string" }
      - { label: "Náhledový obrázek", name: "image", widget: "image" }
      - label: "Galerie fotek"
        name: "images"
        widget: "list"
        allow_add: true
        required: false
        fields:
          - { label: "Fotka", name: "src", widget: "image" }
      - { label: "Obsah", name: "body", widget: "markdown" }

  - name: "gallery"
    label: "Fotogalerie"
    label_singular: "Galerie"
    folder: "src/content/gallery"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Název", name: "title", widget: "string" }
      - { label: "Datum", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss.SSSZ", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Náhledový obrázek", name: "cover", widget: "image" }
      - label: "Fotky"
        name: "photos"
        widget: "list"
        allow_add: true
        fields:
          - { label: "Fotka", name: "src", widget: "image" }

  - name: "events"
    label: "Kalendář událostí"
    label_singular: "Událost"
    folder: "src/content/events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Název", name: "title", widget: "string" }
      - { label: "Datum začátku", name: "startDate", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss.SSSZ" }
      - { label: "Datum konce", name: "endDate", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss.SSSZ", required: false }
      - { label: "Místo", name: "location", widget: "string" }
      - label: "Kategorie"
        name: "category"
        widget: "select"
        options: ["zavod", "trenink", "akce"]
        default: "akce"
      - { label: "Popis", name: "body", widget: "markdown" }

  - name: "settings"
    label: "Nastavení webu"
    files:
      - label: "Viditelnost sekcí"
        name: "site-settings"
        file: "src/content/settings/site-settings.md"
        fields:
          - { label: "Zobrazit kalendář", name: "showCalendar", widget: "boolean", default: true }
          - { label: "Zobrazit rychlé odkazy", name: "showQuickLinks", widget: "boolean", default: true }
          - { label: "Zobrazit Live TV", name: "showLiveTV", widget: "boolean", default: true }
          - { label: "Zobrazit Race Office", name: "showRaceOffice", widget: "boolean", default: true }
          - { label: "Zobrazit oficiální dokumenty", name: "showOfficialDocs", widget: "boolean", default: true }
          - { label: "Zobrazit sponzory", name: "showSponsors", widget: "boolean", default: true }
          - { label: "Zobrazit nejnovější články", name: "showLatestNews", widget: "boolean", default: true }
